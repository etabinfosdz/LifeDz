name: lifedz
description: LifeDz — مركز حياتك اليومي. تطبيق تنظيم الحياة اليومية.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # State management
  flutter_riverpod: ^2.5.1
  # Routing
  go_router: ^14.2.0
  # Backend
  supabase_flutter: ^2.5.6
  # Local storage (offline-first)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # Notifications
  flutter_local_notifications: ^17.2.1
  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  flutter_dotenv: ^5.1.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  assets:
    - .env
